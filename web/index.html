<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>tonsh</title>
    <link rel="icon" type="image/png" sizes="180x180" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/favicon.png" />
    <link rel="stylesheet" href="/xterm.css" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div id="app">
      <button id="open-sidebar" class="ghost-btn" type="button" aria-label="Open sessions">
        <span class="icon">☰</span>
      </button>

      <div id="drawer-scrim" aria-hidden="true"></div>

      <aside id="sidebar" aria-label="Sessions">
        <header class="sidebar-head">
          <h1 class="brand">
            <span class="brand-name">tonsh</span><span class="brand-caret" aria-hidden="true">▋</span>
          </h1>
          <button id="collapse-sidebar" class="ghost-btn" type="button" aria-label="Hide sidebar">
            <span class="icon">‹</span>
          </button>
        </header>

        <div class="sidebar-body">
          <ul id="session-list"></ul>
          <p id="session-empty" class="empty-state" hidden>
            <span class="dim">no sessions</span>
          </p>
        </div>

        <footer class="sidebar-foot">
          <div class="action-rows">
            <div class="action-row">
              <span class="action-label">session</span>
              <button id="new-session" class="act-btn icon-btn" type="button" title="New session" aria-label="New session">+</button>
              <button id="rename-session-btn" class="act-btn icon-btn" type="button" title="Rename session" aria-label="Rename session">✎</button>
              <button id="kill-session-btn" class="act-btn icon-btn danger" type="button" title="Kill session" aria-label="Kill session">✕</button>
            </div>
            <div class="action-row">
              <span class="action-label">window</span>
              <button id="new-window-btn" class="act-btn icon-btn" type="button" title="New window" aria-label="New window">+</button>
              <button id="rename-window-btn" class="act-btn icon-btn" type="button" title="Rename window" aria-label="Rename window">✎</button>
              <button id="kill-window-btn" class="act-btn icon-btn danger" type="button" title="Kill window" aria-label="Kill window">✕</button>
            </div>
            <div class="action-row">
              <span class="action-label">pane</span>
              <button id="split-pane-h-btn" class="act-btn icon-btn" type="button" title="Split pane to the right (side by side)" aria-label="Split right">◫</button>
              <button id="split-pane-v-btn" class="act-btn icon-btn" type="button" title="Split pane downward (stacked)" aria-label="Split down">⊟</button>
              <button id="kill-pane-btn" class="act-btn icon-btn danger" type="button" title="Kill active pane" aria-label="Kill pane">✕</button>
            </div>
          </div>

          <div class="meta-row">
            <div class="font-stepper" role="group" aria-label="Font size">
              <button id="font-minus" class="step-btn" type="button" aria-label="Smaller">−</button>
              <span id="font-size" class="step-readout">14</span>
              <button id="font-plus" class="step-btn" type="button" aria-label="Larger">+</button>
            </div>
            <button id="keypad-toggle" class="ghost-btn" type="button" title="Toggle keypad" aria-label="Toggle keypad">
              <span class="icon">⌨</span>
            </button>
          </div>
        </footer>
      </aside>

      <main id="main">
        <div id="terminal"></div>
        <div id="placeholder">
          <span class="prompt">select a session</span><span class="caret">▋</span>
        </div>
        <div id="keypad" role="toolbar" aria-label="Virtual keys">
          <button class="key" data-seq="\t">Tab</button>
          <button class="key" data-mod="ctrl">Ctrl</button>
          <button class="key" data-seq="\x1b">Esc</button>
          <button class="key" data-seq="\x1b[A" aria-label="Up">↑</button>
          <button class="key" data-seq="\x1b[B" aria-label="Down">↓</button>
          <button class="key" data-seq="\x1b[D" aria-label="Left">←</button>
          <button class="key" data-seq="\x1b[C" aria-label="Right">→</button>
        </div>
      </main>
    </div>
    <script src="/bundle.js"></script>
  </body>
</html>
